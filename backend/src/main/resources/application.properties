spring.application.name=woorido
spring.config.import=optional:file:./.env.properties,optional:file:./.env.local.properties,optional:file:./.env,optional:file:./.env.local,optional:file:./backend/.env.properties,optional:file:./backend/.env.local.properties,optional:file:./backend/.env,optional:file:./backend/.env.local


spring.datasource.url=jdbc:oracle:thin:@wooridodb_high
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver


spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.max-lifetime=1080000
spring.datasource.hikari.keepalive-time=300000


mybatis.mapper-locations=classpath*:mapper/**/*.xml
mybatis.type-aliases-package=com.woorido.common.entity
mybatis.configuration.default-enum-type-handler=org.apache.ibatis.type.EnumTypeHandler
mybatis.configuration.jdbc-type-for-null=NULL


jwt.secret=${JWT_SECRET}
jwt.access-token-expiration=86400000
jwt.refresh-token-expiration=1209600000

server.error.include-message=never

django.brix.base-url=${DJANGO_BRIX_BASE_URL:http://127.0.0.1:8000}
django.brix.api-key=${DJANGO_INTERNAL_API_KEY:woorido-django-internal-key}
django.ledger.base-url=${DJANGO_LEDGER_BASE_URL:${django.brix.base-url}}
django.ledger.api-key=${DJANGO_LEDGER_API_KEY:${django.brix.api-key}}

brix.batch.cron=0 0 3 1 * *
brix.batch.zone=Asia/Seoul
brix.batch.internal-api-key=${BRIX_BATCH_INTERNAL_API_KEY:${django.brix.api-key}}
internal.runtime.enabled=${INTERNAL_RUNTIME_ENABLED:false}

spring.mail.host=${SPRING_MAIL_HOST:}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}

app.mail.from=${APP_MAIL_FROM:no-reply@woorido.com}
app.frontend.base-url=${APP_FRONTEND_BASE_URL:http://localhost:5173}
app.backend.base-url=${APP_BACKEND_BASE_URL:http://localhost:8080}
app.auth.password-reset-path=${APP_PASSWORD_RESET_PATH:/reset-password}
file.upload.dir=${FILE_UPLOAD_DIR:uploads}
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=220MB

oauth.google.client-id=${OAUTH_GOOGLE_CLIENT_ID:}
oauth.google.client-secret=${OAUTH_GOOGLE_CLIENT_SECRET:}
oauth.google.redirect-uri=${OAUTH_GOOGLE_REDIRECT_URI:${app.backend.base-url}/auth/social/callback/google}
oauth.kakao.client-id=${OAUTH_KAKAO_CLIENT_ID:}
oauth.kakao.client-secret=${OAUTH_KAKAO_CLIENT_SECRET:}
oauth.kakao.redirect-uri=${OAUTH_KAKAO_REDIRECT_URI:${app.backend.base-url}/auth/social/callback/kakao}
oauth.state-expiration-seconds=${OAUTH_STATE_EXPIRATION_SECONDS:300}
